[CONFIG]
# Configuration file for example_download_and_rasterize folder

# Name of the project
project: Ohio

# Path to the workspace containing the project
workspace: /data/scratch/globc/bonassies/workspace/swot_for_flood/examples

# Path to the data folder
data_path: /data/scratch/globc/bonassies/data

# Path to the AOI file
aoi: %(workspace)s/%(project)s/aux_data/aoi_4326.gpkg

#  EPSG code of the CRS of the project
CRS= 26916

# CRS of the AOI file
aoi_crs= 4326

# First and last time of the data to download
first_time= 2023-01-01
last_time= 2025-05-01

# nodes to use for the download (optional)
nodes = 8

# Type of SWOT data to download (optional) can be PIXC, LakeSP, Nodes
download_type: PIXC

# Passes of interest to download (optional)
passes = [466, 481]

# Tile names to rasterize (optional)
tile_names_selection: [[481_220L, 481_221L], [466_087R, 466_088R]] 

# variables to rasterize (optional)
# example: variables: ['height', 'water_mask', 'water_flag', 'water_class', 'water_confidence', 'water_frac', 'water_frac_uncertainty']

# Pixel resolution of the rasterized data (optional)
# pixel_resolution: 10

# GDAL environment variables for rasterization (optional)
GDAL_NUM_THREADS = 10
GDAL_CACHEMAX = 160000

# Boolean to activate automatic download, rasterize and save when loading the project python file (optional)
# It can be deactivate if everything has been already downloaded and rasterized
do_download = False
do_make_gpkg = False
do_make_tiff = False   

