[CONFIG]
# Configuration file for example_download_and_rasterize folder

# Name of the project
project: Mozambique

# Path to the workspace containing the project
workspace: /data/scratch/globc/bonassies/workspace/swot_for_flood/examples

# Path to the data folder
data_path: /data/scratch/globc/bonassies/data

# Path to the AOI file
# aoi: %(workspace)s/%(project)s/aux_data/AOI_Mozambique_32736.gpkg
# floodmask_path: %(workspace)s/%(project)s/aux_data/AOI_Mozambique_32736.gpkg
# controlmask_path: %(workspace)s/%(project)s/aux_data/AOI_Mozambique_32736.gpkg
# esa_worldcover_path: %(workspace)s/%(project)s/aux_data/ESA_WC_10m_cut_AOI_nrow1502_ncol2002.tif

aoi: %(workspace)s/%(project)s/aux_data/AOI_ANIMATION_32736.gpkg
floodmask_path: %(workspace)s/%(project)s/aux_data/AOI_ANIMATION_32736.gpkg
controlmask_path: %(workspace)s/%(project)s/aux_data/AOI_ANIMATION_32736.gpkg
esa_worldcover_path: %(workspace)s/%(project)s/aux_data/ESA_WC_ANIM_32736_nrow951_ncol1416.tif

#  EPSG code of the CRS of the project
CRS= 32736

# CRS of the AOI file
aoi_crs= 32736

# First and last time of the data to download
# first_time= 2022-02-01
# last_time= 2026-03-01
first_time= 2025-01-01
last_time= 2026-02-01

# nodes to use for the download (optional)
nodes = 8

# Type of SWOT data to download (optional) can be PIXC, LakeSP, Nodes
download_type: PIXC

# Passes of interest to download (optional)
# passes = [165]

# Tile names to rasterize (optional)
# tile_names_selection: [[165_111R]]

# List dry and flood dates
# list_dry_dates: [2025-05-03, 2025-05-24, 2025-06-14, 2025-07-05, 2025-07-26, 2025-08-16, 2025-09-06, 2025-09-26, 2025-10-17, 2025-11-07, 2025-11-28, 2025-12-19]
# list_flood_dates: [2026-01-30, 2026-02-20]
# list_dry_dates: [2025-05-24, 2025-06-14, 2025-07-05, 2025-07-26, 2025-08-16, 2025-09-06, 2025-09-26, 2025-10-17, 2025-11-07, 2025-11-28, 2026-01-09]
list_dry_dates: [2025-05-24]
list_flood_dates: [2025-05-24, 2025-06-14, 2025-07-05, 2025-07-26, 2025-08-16, 2025-09-06, 2025-09-26, 2025-10-17, 2025-11-07, 2025-11-28, 2025-12-19, 2026-01-09]
# list_flood_dates: [2026-01-30]

# variables to rasterize (optional) - default: 
# variables: [sig0, coherent_power, incidence, gamma_tot, gamma_SNR, height, classification, bright_land_flag]
# variables: [sig0, coherent_power, gamma_tot, gamma_SNR, height, classification, power_plus_y, power_minus_y,  interf_real, interf_imag]
variables: [sig0, coherent_power, gamma_tot, gamma_SNR, classification]

# Pixel resolution of the rasterized data (optional)
# pixel_resolution = 10

# GDAL environment variables for rasterization (optional)
GDAL_NUM_THREADS = 11
GDAL_CACHEMAX = 160000

# Boolean to activate automatic download, rasterize and save when loading the project python file (optional)
# It can be deactivate if everything has been already downloaded and rasterized
do_download = False
do_make_gpkg = False
do_make_tiff = False   

